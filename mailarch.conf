[imap]

# IMAP server host name or IP address
#
host = "mail.example.com"

# IMAP server port (defaults to 993)
#
#port = 993

# IMAP user name
#
username = "user@example.com"

# IMAP password
#
password = "secret"

[archive]

# The local mailbox directory to archive messages into
#
directory = "/home/user/mail-archive"

# Local mailbox storage format.
#   maildir    - Standard Maildir: nested subdirs with cur/new/tmp (default)
#   maildir++  - Maildir++: flat dot-prefixed dirs with cur/new/tmp
#   mh         - MH format: numbered files + .mh_sequences (Claws-Mail native)
#
#format = "maildir"

# Archive messages older than this many days.
# Default is 30 days.
# Set to 0 to disable age-based archiving and always archive all messages.
#
#min_age_days = 30

# Mailboxes to skip entirely
#
skip_mailboxes = [
    "Spam",
    "Trash",
    "Queue",
    "Drafts",
]

# Rename mailboxes to these names when archiving.
# This is useful to avoid issues with case-sensitive mailbox names,
# or to map different mailbox names to a common set.
#
# The keys are the IMAP mailbox names, and the values are the local mailbox names:
#   "IMAP-mailbox-name" = "local-mailbox-name"
#
rename_mailboxes = {
    #"INBOX" = "inbox",
    #"Inbox" = "inbox",
    #"Sent" = "sent",
    #"Queue" = "queue",
    #"Drafts" = "draft",
    #"Trash" = "trash",
}
